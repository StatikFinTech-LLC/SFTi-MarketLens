/* ── MARKET BAR — floating, no border ── */
#market-bar{position:fixed;top:0;left:0;right:0;z-index:100;
  padding:env(safe-area-inset-top,12px) 18px 14px;
  background:linear-gradient(to bottom,rgba(3,6,9,.92) 0%,rgba(3,6,9,.7) 75%,transparent 100%);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);}
#bar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
#session-label{font-family:'Orbitron',sans-serif;font-size:9.5px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;transition:color 1.5s ease;}
#clock-group{display:flex;align-items:baseline;gap:5px;}
#cst-clock{font-size:9px;color:var(--text-dim);letter-spacing:.04em;}
#et-label{font-size:8.5px;letter-spacing:.1em;color:var(--text-dim);}
#et-clock{font-size:12px;font-weight:400;letter-spacing:.06em;}
#timeline-track{position:relative;height:5px;border-radius:3px;
  background:var(--overnight);overflow:visible;}
.seg{position:absolute;top:0;height:100%;border-radius:2px;}
#seg-pre{background:var(--pre);}
#seg-reg{background:var(--regular);}
#seg-post{background:var(--post);}
#cursor{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:13px;height:13px;border-radius:50%;background:#fff;z-index:2;
  box-shadow:0 0 0 2px rgba(255,255,255,.2),0 0 14px rgba(255,255,255,.9);
  animation:cp 2.4s ease-in-out infinite;}
@keyframes cp{
  0%,100%{box-shadow:0 0 0 2px rgba(255,255,255,.15),0 0 10px rgba(255,255,255,.7);}
  50%{box-shadow:0 0 0 4px rgba(255,255,255,.06),0 0 22px #fff;}}
#tl-labels{position:relative;height:16px;margin-top:4px;}
.tl-lbl{position:absolute;font-size:8px;letter-spacing:.03em;
  color:var(--text-dim);transform:translateX(-50%);white-space:nowrap;}

/* ── CANVAS ── */
#canvas{position:fixed;inset:0;z-index:1;pointer-events:none;touch-action:none;}

.img-card{position:absolute;pointer-events:all;border-radius:8px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.7),0 0 0 .5px rgba(255,255,255,.06);
  transition:box-shadow .2s;user-select:none;-webkit-user-select:none;touch-action:none;}
.img-card:hover{box-shadow:0 16px 52px rgba(0,0,0,.8),0 0 0 1px rgba(82,201,224,.25);}
.img-card img{display:block;width:100%;height:auto;pointer-events:none;-webkit-user-drag:none;}
.card-meta{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;
  background:linear-gradient(transparent,rgba(0,0,0,.65));
  font-size:7px;letter-spacing:.06em;color:rgba(255,255,255,.3);}
.resize-handle{position:absolute;bottom:0;right:0;width:28px;height:28px;
  cursor:nwse-resize;touch-action:none;z-index:3;
  display:flex;align-items:flex-end;justify-content:flex-end;padding:5px;}
.resize-handle::after{content:'';display:block;width:9px;height:9px;
  border-right:2px solid rgba(255,255,255,.4);border-bottom:2px solid rgba(255,255,255,.4);
  border-radius:1px;}

/* ── LIQUID GLASS BUBBLES ── */
#bubbles{position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 16px);
  left:50%;transform:translateX(-50%);
  display:flex;gap:40px;z-index:200;align-items:flex-end;}

.bubble{width:50px;height:50px;border-radius:50%;
  position:relative;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);}

/* iridescent rim ring */
.bubble::before{content:'';position:absolute;inset:-1px;border-radius:50%;
  background:conic-gradient(from 200deg,
    rgba(82,201,224,.6),rgba(167,139,250,.5),
    rgba(82,224,168,.5),rgba(217,79,79,.4),rgba(82,201,224,.6));
  z-index:0;opacity:.75;}

/* glass fill */
.bubble-glass{position:absolute;inset:0;border-radius:50%;z-index:1;
  background:
    radial-gradient(ellipse at 28% 16%,rgba(255,255,255,.26) 0%,transparent 52%),
    linear-gradient(150deg,rgba(255,255,255,.11) 0%,rgba(255,255,255,.04) 40%,rgba(0,0,0,.1) 100%);
  backdrop-filter:blur(44px) saturate(210%) brightness(1.1);
  -webkit-backdrop-filter:blur(44px) saturate(210%) brightness(1.1);
  border:1px solid rgba(255,255,255,.13);
  box-shadow:0 8px 28px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.3),
    inset 0 -2px 4px rgba(0,0,0,.18);}

.bubble svg{position:absolute;inset:0;margin:auto;width:21px;height:21px;z-index:2;}
.bubble:hover{transform:scale(1.1);}
.bubble:active{transform:scale(.93);}

.badge{position:absolute;top:-2px;right:-2px;width:15px;height:15px;border-radius:50%;
  background:var(--accent);color:#000;font-size:8px;font-weight:700;
  display:none;align-items:center;justify-content:center;z-index:5;pointer-events:none;}
.badge.on{display:flex;}
#upload-input{display:none;}
label.bubble{cursor:pointer;}

/* ── API KEY OVERLAY ── */
#key-overlay{position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.78);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  display:flex;align-items:center;justify-content:center;padding:24px;}
#key-overlay.hidden{display:none;}
.key-box{width:100%;max-width:340px;

.key-box p{font-size:10.5px;line-height:1.65;color:rgba(221,228,240,.55);margin-bottom:16px;}
.key-box input{width:100%;padding:11px 13px;

.key-box input:focus{border-color:rgba(82,201,224,.4);}

.key-note{font-size:9px;color:var(--text-dim);text-align:center;margin-top:10px;line-height:1.5;}

/* ── PANEL ── */
#panel{position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(3,7,16,.93);
  backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
  border-top:1px solid rgba(82,201,224,.14);
  padding:0 22px calc(env(safe-area-inset-bottom,0px) + 106px);
  max-height:70vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .36s cubic-bezier(.32,.72,0,1);}
#panel.open{transform:translateY(0);}
#panel-handle{width:32px;height:3px;background:rgba(255,255,255,.1);
  border-radius:2px;margin:12px auto 0;}
#panel-inner{padding-top:16px;}
#panel-title{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:.2em;
  color:var(--accent);text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;}
#close-btn{background:none;border:none;color:var(--text-dim);
  font-size:20px;cursor:pointer;line-height:1;padding:0 2px;}
#analysis-out{font-size:11.5px;line-height:1.8;color:var(--text);}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text-dim);}
.dots{display:flex;gap:5px;}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--accent);
  animation:dp 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.18;transform:scale(.75);}40%{opacity:1;transform:scale(1);}}

/* ── TOAST ── */
#toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 68px);
  left:50%;transform:translateX(-50%) translateY(-6px);
  background:rgba(82,201,224,.12);border:1px solid rgba(82,201,224,.28);
  color:var(--accent);padding:6px 14px;border-radius:18px;font-size:10px;
  letter-spacing:.08em;opacity:0;pointer-events:none;z-index:500;
  transition:opacity .22s,transform .22s;
  backdrop-filter:blur(12px);white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

<script>
// ── OPFS ──────────────────────────────────────────────
let opfsRoot=null;
(async()=>{
  if('storage' in navigator&&'getDirectory' in navigator.storage){
    try{if(navigator.storage.persist)await navigator.storage.persist();
      opfsRoot=await navigator.storage.getDirectory();}catch(e){}
  }
})();
async function persistToOPFS(file,dateKey){
  if(!opfsRoot)return;
  try{const dir=await opfsRoot.getDirectoryHandle(dateKey,{create:true});
    const fh=await dir.getFileHandle(`${Date.now()}_${file.name.replace(/[^a-z0-9._-]/gi,'_')}`,{create:true});
    const wr=await fh.createWritable();await wr.write(file);await wr.close();}catch(e){}
}

// ── API KEY ────────────────────────────────────────────
let apiKey=sessionStorage.getItem('sfti_key')||'';
const keyOverlay=document.getElementById('key-overlay');
const keyInput=document.getElementById('key-input');
if(apiKey)keyOverlay.classList.add('hidden');

document.getElementById('key-save').addEventListener('click',()=>{
  const v=keyInput.value.trim();
  if(!v.startsWith('sk-ant')){toast('Key must start with sk-ant-');return;}
  apiKey=v;sessionStorage.setItem('sfti_key',v);
  keyOverlay.classList.add('hidden');toast('API key saved ✓');
});

// Long-press eye = re-enter key
let lpTimer;
const analyzeBtn=document.getElementById('analyze-btn');
analyzeBtn.addEventListener('pointerdown',()=>{
  lpTimer=setTimeout(()=>{keyInput.value='';keyOverlay.classList.remove('hidden');},700);
});
['pointerup','pointerleave'].forEach(ev=>analyzeBtn.addEventListener(ev,()=>clearTimeout(lpTimer)));

// ── MARKET BAR ────────────────────────────────────────
const MKT={preStart:4,regStart:9.5,postStart:16,postEnd:20};
const SESS={
  OVERNIGHT:{label:'OVERNIGHT',color:'var(--overnight)'},
  PRE_MARKET:{label:'PRE-MARKET',color:'var(--pre)'},
  MARKET_OPEN:{label:'MARKET OPEN',color:'var(--regular)'},
  AFTER_HOURS:{label:'AFTER HOURS',color:'var(--post)'}
};
function getET(){
  const p=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',
    hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());
  const g=t=>parseInt(p.find(x=>x.type===t)?.value||'0');
  const h=g('hour'),m=g('minute'),s=g('second');
  return{h,m,frac:h+m/60+s/3600};
}
function getCSTStr(){
  return new Intl.DateTimeFormat('en-US',{timeZone:'America/Chicago',
    hour:'numeric',minute:'2-digit',hour12:true}).format(new Date())+' CST';
}
function fmt12(h,m){const ap=h>=12?'PM':'AM',h12=h%12||12;return`${h12}:${String(m).padStart(2,'0')} ${ap}`;}
function sessOf(f){
  if(f<MKT.preStart||f>=MKT.postEnd)return'OVERNIGHT';
  if(f<MKT.regStart)return'PRE_MARKET';
  if(f<MKT.postStart)return'MARKET_OPEN';
  return'AFTER_HOURS';
}
const pct=f=>(f/24)*100;
function updateBar(){
  const{h,m,frac}=getET();
  const ps=pct(MKT.preStart),rs=pct(MKT.regStart),
        po=pct(MKT.postStart),pe=pct(MKT.postEnd);
  document.getElementById('seg-pre').style.cssText=`left:${ps}%;width:${rs-ps}%;`;
  document.getElementById('seg-reg').style.cssText=`left:${rs}%;width:${po-rs}%;`;
  document.getElementById('seg-post').style.cssText=`left:${po}%;width:${pe-po}%;`;
  document.getElementById('cursor').style.left=`${Math.min(pct(frac),100)}%`;
  document.getElementById('et-clock').textContent=fmt12(h,m);
  document.getElementById('cst-clock').textContent=getCSTStr();
  const s=SESS[sessOf(frac)];
  document.getElementById('session-label').textContent=s.label;
  document.getElementById('session-label').style.color=s.color;
  const lbl=(id,f,t)=>{const e=document.getElementById(id);e.textContent=t;e.style.left=`${pct(f)}%`;};
  lbl('lbl-pre',MKT.preStart,'4:00 AM ET');lbl('lbl-reg',MKT.regStart,'9:30 AM');
  lbl('lbl-post',MKT.postStart,'4:00 PM');lbl('lbl-end',MKT.postEnd,'8:00 PM');
}
updateBar();setInterval(updateBar,20000);

// ── TOAST ──────────────────────────────────────────────
function toast(msg,ms=2400){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),ms);
}

// ── IMAGE CARDS ───────────────────────────────────────
let images=[],zTop=10;
const canvas=document.getElementById('canvas');

function syncBadge(){
  const b=document.getElementById('img-badge');
  b.textContent=images.length;b.classList.toggle('on',images.length>0);
}

function makeDraggable(card){
  let ox,oy,drag=false;
  const ds=(cx,cy)=>{drag=true;ox=cx-card.offsetLeft;oy=cy-card.offsetTop;card.style.zIndex=++zTop;};
  const dm=(cx,cy)=>{if(!drag)return;card.style.left=`${cx-ox}px`;card.style.top=`${cy-oy}px`;};
  const de=()=>{drag=false;};
  card.addEventListener('mousedown',e=>{if(e.target.classList.contains('resize-handle'))return;
    e.preventDefault();ds(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>dm(e.clientX,e.clientY));
  window.addEventListener('mouseup',de);
  card.addEventListener('touchstart',e=>{
    if(e.target.classList.contains('resize-handle'))return;
    if(e.touches.length===1)ds(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&drag){e.preventDefault();dm(e.touches[0].clientX,e.touches[0].clientY);}
  },{passive:false});
  card.addEventListener('touchend',de);
}

function makeResizable(card){
  const h=card.querySelector('.resize-handle');
  let resizing=false,sx,sw;

  // Mouse corner drag
  h.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();
    resizing=true;sx=e.clientX;sw=card.offsetWidth;card.style.zIndex=++zTop;});
  window.addEventListener('mousemove',e=>{if(!resizing)return;
    card.style.width=`${Math.max(80,sw+(e.clientX-sx))}px`;});
  window.addEventListener('mouseup',()=>{resizing=false;});

  // Touch corner drag
  h.addEventListener('touchstart',e=>{e.stopPropagation();
    resizing=true;sx=e.touches[0].clientX;sw=card.offsetWidth;card.style.zIndex=++zTop;
  },{passive:true});
  h.addEventListener('touchmove',e=>{if(!resizing)return;e.preventDefault();
    card.style.width=`${Math.max(80,sw+(e.touches[0].clientX-sx))}px`;
  },{passive:false});
  h.addEventListener('touchend',()=>{resizing=false;});

  // Pinch-to-resize (two fingers on card)
  let lastDist=null;
  card.addEventListener('touchstart',e=>{
    if(e.touches.length===2)
      lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                          e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&lastDist!==null){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
      card.style.width=`${Math.max(80,Math.min(window.innerWidth*.95,card.offsetWidth*(d/lastDist)))}px`;
      lastDist=d;
    }
  },{passive:false});
  card.addEventListener('touchend',e=>{if(e.touches.length<2)lastDist=null;});
}

function spawnCard(src,name,date){
  const vw=window.innerWidth,vh=window.innerHeight;
  const bh=document.getElementById('market-bar').offsetHeight+8;
  const iw=Math.min(Math.round(vw*.46),320);
  const left=12+Math.random()*Math.max(0,vw-iw-24);
  const top=bh+10+Math.random()*Math.max(0,vh-bh-260);
  const tilt=(Math.random()-.5)*3;

  const card=document.createElement('div');
  card.className='img-card';
  card.style.cssText=`left:${left}px;top:${top}px;width:${iw}px;z-index:${++zTop};transform:rotate(${tilt}deg);`;

  const img=document.createElement('img');
  img.src=src;img.draggable=false;
  img.onload=()=>{
    const r=img.naturalWidth/img.naturalHeight;
    if(r>2.1)card.style.width=`${Math.min(vw*.7,460)}px`;
    else if(r<.55)card.style.width=`${Math.min(vw*.3,185)}px`;
  };

  const meta=document.createElement('div');
  meta.className='card-meta';
  meta.textContent=`${date} · ${name.slice(0,24)}`;

  const rh=document.createElement('div');
  rh.className='resize-handle';

  card.appendChild(img);card.appendChild(meta);card.appendChild(rh);
  canvas.appendChild(card);
  makeDraggable(card);makeResizable(card);
}

async function ingestFile(file){
  const date=new Date().toISOString().slice(0,10);
  await persistToOPFS(file,date);
  const reader=new FileReader();
  reader.onload=e=>{
    const src=e.target.result;
    images.push({src,mediaType:file.type||'image/jpeg',name:file.name,date});
    spawnCard(src,file.name,date);syncBadge();toast(`↑ ${file.name.slice(0,20)}`);
  };
  reader.readAsDataURL(file);
}

document.getElementById('upload-input').addEventListener('change',async e=>{
  for(const f of Array.from(e.target.files))await ingestFile(f);
  e.target.value='';
});

// ── ANALYSIS ──────────────────────────────────────────
async function runAnalysis(){
  if(!apiKey){keyOverlay.classList.remove('hidden');return;}
  if(!images.length){toast('No screenshots loaded');return;}

  const panel=document.getElementById('panel');
  const out=document.getElementById('analysis-out');
  panel.classList.add('open');
  out.innerHTML=`<div class="loading-row"><div class="dots"><span></span><span></span><span></span></div><span style="font-size:11px;color:var(--text-dim)">Reading ${images.length} screenshot${images.length>1?'s':''}…</span></div>`;

  const imgBlocks=images.map(img=>({type:'image',source:{type:'base64',media_type:img.mediaType,data:img.src.split(',')[1]}}));

  const prompt=images.length===1
    ?`Analyze this trading screenshot. Extract every visible data point:
— Timestamp / session (pre/regular/after-hours/overnight)
— All ticker symbols, prices, % change
— Volume if visible
— P&L, positions, orders if present
Format with clear labels. Be data-dense.`
    :`${images.length} trading screenshots.

Per-image: timestamp, session, tickers + prices + % change.

Delta Report:
• Tickers added / removed
• Price Δ per ticker (exact move + direction)
• % change shifts
• Session transitions
• Momentum patterns

Use → for transitions, ▲ up, ▼ down. Concise and precise.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:[...imgBlocks,{type:'text',text:prompt}]}]
      })
    });

    if(!resp.ok){
      const err=await resp.json().catch(()=>({error:{message:resp.statusText}}));
      out.innerHTML=`<span style="color:var(--pre)">API error ${resp.status}: ${err.error?.message||resp.statusText}</span>`;
      if(resp.status===401){sessionStorage.removeItem('sfti_key');apiKey='';setTimeout(()=>keyOverlay.classList.remove('hidden'),800);}
      return;
    }

    const data=await resp.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('');
    out.innerHTML=raw
      .replace(/▲([^\s<\n]*)/g,'<span style="color:var(--regular)">▲$1</span>')
      .replace(/▼([^\s<\n]*)/g,'<span style="color:var(--pre)">▼$1</span>')
      .replace(/\+([0-9.]+%?)/g,'<span style="color:var(--regular)">+$1</span>')
      .replace(/(?<![0-9e])-([0-9.]+%?)/g,'<span style="color:var(--pre)">-$1</span>')
      .replace(/→/g,'<span style="color:var(--accent)">→</span>')
      .replace(/\n/g,'<br>');

  }catch(err){
    out.innerHTML=`<span style="color:var(--pre)">Error: ${err.message}</span>`;
  }
}

// Tap = analyze, long-press = key (already handled above via pointerdown timer)
analyzeBtn.addEventListener('click',()=>{runAnalysis();});

document.getElementById('close-btn').addEventListener('click',()=>
  document.getElementById('panel').classList.remove('open'));

let py0=0;
document.getElementById('panel').addEventListener('touchstart',e=>{py0=e.touches[0].clientY;},{passive:true});
document.getElementById('panel').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-py0>55)document.getElementById('panel').classList.remove('open');
},{passive:true});
</script>
