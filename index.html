<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- iOS 26.4 Developer Beta: persistent storage hint -->
  <meta name="apple-storage-policy" content="persistent">
  <title>SFTi · Market Lens</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --overnight : #3a3a4a;
      --pre       : #d94f4f;
      --regular   : #3ec97a;
      --post      : #d9883a;
      --accent    : #52c9e0;
      --glass     : rgba(255,255,255,0.04);
      --glass-b   : rgba(255,255,255,0.09);
      --text      : #dde4f0;
      --text-dim  : #5a6478;
      --bg        : #030609;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    /* Subtle grid */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(82,201,224,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(82,201,224,0.018) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── MARKET BAR ──────────────────────────────── */
    #market-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: env(safe-area-inset-top, 10px) 18px 14px;
      background: rgba(3, 6, 9, 0.88);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid rgba(82,201,224,0.1);
    }

    #bar-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 9px;
    }

    #session-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 1s ease;
    }

    #clock-group {
      display: flex; align-items: baseline; gap: 5px;
    }
    #et-label {
      font-size: 9px; letter-spacing: 0.1em; color: var(--text-dim);
    }
    #et-clock {
      font-size: 12px; font-weight: 400; color: var(--text); letter-spacing: 0.06em;
    }
    #cst-clock {
      font-size: 9px; color: var(--text-dim); letter-spacing: 0.04em;
    }

    /* Track */
    #timeline-track {
      position: relative;
      height: 5px;
      border-radius: 3px;
      background: var(--overnight);
      overflow: visible;
    }

    .seg {
      position: absolute; top: 0; height: 100%; border-radius: 2px;
    }
    #seg-pre  { background: var(--pre); }
    #seg-reg  { background: var(--regular); }
    #seg-post { background: var(--post); }

    #cursor {
      position: absolute;
      top: 50%; transform: translate(-50%, -50%);
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 0 14px rgba(255,255,255,0.9);
      z-index: 2;
      animation: cursorPulse 2.4s ease-in-out infinite;
    }
    @keyframes cursorPulse {
      0%,100% { box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 0 10px rgba(255,255,255,0.7); }
      50%      { box-shadow: 0 0 0 4px rgba(255,255,255,0.08), 0 0 22px rgba(255,255,255,1); }
    }

    /* Labels row */
    #tl-labels {
      position: relative; height: 16px; margin-top: 5px;
    }
    .tl-lbl {
      position: absolute;
      font-size: 8.5px; letter-spacing: 0.04em;
      color: var(--text-dim);
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ── IMAGE CANVAS ────────────────────────────── */
    #canvas {
      position: fixed; inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .img-card {
      position: absolute;
      pointer-events: all;
      cursor: grab;
      border-radius: 7px;
      overflow: hidden;
      box-shadow:
        0 6px 28px rgba(0,0,0,0.65),
        0 0 0 0.5px rgba(255,255,255,0.06);
      transition: box-shadow 0.25s;
      user-select: none;
      -webkit-user-select: none;
    }
    .img-card:active { cursor: grabbing; }
    .img-card:hover {
      box-shadow:
        0 14px 50px rgba(0,0,0,0.75),
        0 0 0 1px rgba(82,201,224,0.28);
    }
    .img-card img {
      display: block; width: 100%; height: auto;
      pointer-events: none; -webkit-user-drag: none;
    }
    .img-card .card-meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 5px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.68));
      font-size: 7.5px; letter-spacing: 0.07em;
      color: rgba(255,255,255,0.35);
    }

    /* ── BOTTOM BUBBLES ──────────────────────────── */
    #bubbles {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 30px);
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 22px;
      z-index: 200;
    }

    .bubble {
      width: 62px; height: 62px;
      border-radius: 50%;
      background: rgba(255,255,255,0.045);
      backdrop-filter: blur(36px) saturate(220%);
      -webkit-backdrop-filter: blur(36px) saturate(220%);
      border: 1px solid rgba(255,255,255,0.11);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s;
      position: relative; overflow: hidden;
    }
    .bubble::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(ellipse at 28% 22%, rgba(255,255,255,0.14), transparent 58%);
      pointer-events: none;
    }
    .bubble:hover {
      transform: scale(1.11);
      box-shadow:
        0 14px 48px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .bubble:active { transform: scale(0.94); }
    .bubble svg { width: 25px; height: 25px; position: relative; z-index: 1; }

    #upload-input { display: none; }
    label.bubble { cursor: pointer; }

    .badge {
      position: absolute; top: -1px; right: -1px;
      width: 17px; height: 17px; border-radius: 50%;
      background: var(--accent); color: #000;
      font-size: 8.5px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
      z-index: 2; pointer-events: none;
    }
    .badge.on { display: flex; }

    /* ── ANALYSIS PANEL ──────────────────────────── */
    #panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 300;
      background: rgba(3, 7, 16, 0.94);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-top: 1px solid rgba(82,201,224,0.18);
      padding: 0 22px calc(env(safe-area-inset-bottom, 0px) + 130px);
      max-height: 68vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
    }
    #panel.open { transform: translateY(0); }

    #panel-inner { padding-top: 18px; }
    #panel-handle {
      width: 34px; height: 3.5px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    #panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 9.5px; letter-spacing: 0.2em;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #close-btn {
      background: none; border: none; color: var(--text-dim);
      font-size: 20px; cursor: pointer; line-height: 1;
      padding: 0 2px;
    }
    #analysis-out {
      font-size: 11.5px; line-height: 1.75;
      color: var(--text);
    }

    .loading-row {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-dim);
    }
    .dots { display: flex; gap: 5px; }
    .dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent);
      animation: dp 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dp {
      0%,80%,100% { opacity:.18; transform:scale(.75); }
      40%          { opacity:1;   transform:scale(1); }
    }

    /* ── TOAST ───────────────────────────────────── */
    #toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 76px);
      left: 50%; transform: translateX(-50%) translateY(-6px);
      background: rgba(82,201,224,0.13);
      border: 1px solid rgba(82,201,224,0.28);
      color: var(--accent);
      padding: 7px 15px; border-radius: 18px;
      font-size: 10.5px; letter-spacing: 0.08em;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 500; white-space: nowrap;
      backdrop-filter: blur(12px);
    }
    #toast.on {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
  </style>

</head>
<body>

<!-- ── MARKET BAR ───────────────────── -->

<div id="market-bar">
  <div id="bar-header">

      <span id="cst-clock"></span>

<div id="bubbles">

  <!-- Upload -->

  <label class="bubble" title="Add Screenshots">

    <svg viewBox="0 0 24 24" fill="none">

      </defs>
      <rect x="3" y="3" width="18" height="18" rx="3" stroke="url(#hg1)" stroke-width="1.4"/>
      <circle cx="8.5" cy="8.5" r="1.5" fill="url(#hg1)" opacity=".7"/>
      <path d="M3 15l5-5 4 4 3-3 6 6" stroke="url(#hg1)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

            stroke="url(#hg2)" stroke-width="1" stroke-linecap="round" opacity=".45"/>
      <path d="M7 7l1 1M16 16l1 1M7 17l1-1M16 8l1-1"

<!-- ── ANALYSIS PANEL ────────────────── -->

      <span>SFTi Market Lens · Δ Analysis</span>

</div>

<!-- ── TOAST ─────────────────────────── -->

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// iOS 26.4 Developer Beta — OPFS Storage Init
// Origin Private File System for persistent screenshot folders
// Leverages navigator.storage.persist() which iOS 26.4 honors
// ══════════════════════════════════════════════════════════════
let opfsRoot = null;

(async () => {
  if ('storage' in navigator && 'getDirectory' in navigator.storage) {
    try {
      // iOS 26.4: request persistent quota before getDirectory
      if (navigator.storage.persist) await navigator.storage.persist();
      opfsRoot = await navigator.storage.getDirectory();
      console.log('[SFTi] OPFS ready — iOS 26.4 persistent storage active');
    } catch (e) {
      console.warn('[SFTi] OPFS unavailable, images stay in-memory only', e);
    }
  }
})();

async function persistToOPFS(file, dateKey) {
  if (!opfsRoot) return;
  try {
    const dir = await opfsRoot.getDirectoryHandle(dateKey, { create: true });
    const safe = file.name.replace(/[^a-z0-9._\-]/gi, '_');
    const fh   = await dir.getFileHandle(`${Date.now()}_${safe}`, { create: true });
    const wr   = await fh.createWritable();
    await wr.write(file);
    await wr.close();
    console.log(`[SFTi] OPFS: ${dateKey}/${safe}`);
  } catch (e) {
    console.warn('[SFTi] OPFS write failed', e);
  }
}

// ══════════════════════════════════════════════════════════════
// MARKET TIME BAR
// All segment boundaries in fractional ET hours (24h)
// Segments: Overnight grey | Pre red | Regular green | Post orange | Overnight grey
// ══════════════════════════════════════════════════════════════
const MKT = {
  preStart:  4,      // 4:00 AM ET
  regStart:  9.5,    // 9:30 AM ET
  postStart: 16,     // 4:00 PM ET
  postEnd:   20      // 8:00 PM ET
};

const SESSION_MAP = {
  OVERNIGHT:   { label: 'OVERNIGHT',   color: 'var(--overnight)' },
  PRE_MARKET:  { label: 'PRE-MARKET',  color: 'var(--pre)' },
  MARKET_OPEN: { label: 'MARKET OPEN', color: 'var(--regular)' },
  AFTER_HOURS: { label: 'AFTER HOURS', color: 'var(--post)' }
};

function getETTime() {
  const now = new Date();
  // Intl-based ET conversion — handles DST automatically
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  }).formatToParts(now);
  const get = t => parseInt(parts.find(p => p.type === t)?.value || '0');
  const h = get('hour'), m = get('minute'), s = get('second');
  return { h, m, s, frac: h + m/60 + s/3600 };
}

function getCSTTime() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    hour: 'numeric', minute: '2-digit', hour12: true
  }).formatToParts(now);
  const h  = parts.find(p => p.type === 'hour')?.value || '';
  const m  = parts.find(p => p.type === 'minute')?.value || '';
  const ap = parts.find(p => p.type === 'dayperiod')?.value || '';
  return `${h}:${m} ${ap} CST`;
}

function fmt12et(h, m) {
  const ap  = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ap}`;
}

function sessionOf(frac) {
  if (frac < MKT.preStart || frac >= MKT.postEnd) return 'OVERNIGHT';
  if (frac < MKT.regStart)  return 'PRE_MARKET';
  if (frac < MKT.postStart) return 'MARKET_OPEN';
  return 'AFTER_HOURS';
}

function pct(f) { return (f / 24) * 100; }

function updateBar() {
  const { h, m, frac } = getETTime();

  // Segment widths
  const preS  = pct(MKT.preStart);
  const regS  = pct(MKT.regStart);
  const postS = pct(MKT.postStart);
  const postE = pct(MKT.postEnd);

  const el = id => document.getElementById(id);

  el('seg-pre').style.cssText  = `left:${preS}%;  width:${regS  - preS}%;`;
  el('seg-reg').style.cssText  = `left:${regS}%;  width:${postS - regS}%;`;
  el('seg-post').style.cssText = `left:${postS}%; width:${postE - postS}%;`;
  el('cursor').style.left      = `${Math.min(pct(frac), 100)}%`;

  el('et-clock').textContent  = fmt12et(h, m);
  el('cst-clock').textContent = getCSTTime();

  const sess = sessionOf(frac);
  const info = SESSION_MAP[sess] || SESSION_MAP.OVERNIGHT;
  el('session-label').textContent = info.label;
  el('session-label').style.color = info.color;

  // Labels positioned under boundary marks
  const setLbl = (id, fracPos, text) => {
    const e = el(id);
    e.textContent  = text;
    e.style.left   = `${pct(fracPos)}%`;
  };
  setLbl('lbl-pre',  MKT.preStart,  '4:00 AM ET');
  setLbl('lbl-reg',  MKT.regStart,  '9:30 AM');
  setLbl('lbl-post', MKT.postStart, '4:00 PM');
  setLbl('lbl-end',  MKT.postEnd,   '8:00 PM');
}

updateBar();
setInterval(updateBar, 20000);

// ══════════════════════════════════════════════════════════════
// IMAGE UPLOAD + FLOATING CARDS
// ══════════════════════════════════════════════════════════════
let images   = [];  // { id, src, mediaType, name, date }
let zTop     = 10;
const canvas = document.getElementById('canvas');

function toastMsg(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('on'), ms);
}

function syncBadge() {
  const b = document.getElementById('img-badge');
  b.textContent = images.length;
  b.classList.toggle('on', images.length > 0);
}

function barHeight() {
  return document.getElementById('market-bar').offsetHeight;
}

function makeDraggable(el) {
  let ox, oy, dragging = false;

  const start = (cx, cy) => {
    dragging = true;
    ox = cx - el.offsetLeft;
    oy = cy - el.offsetTop;
    el.style.zIndex = ++zTop;
  };
  const move = (cx, cy) => {
    if (!dragging) return;
    el.style.left = `${cx - ox}px`;
    el.style.top  = `${cy - oy}px`;
  };
  const end = () => { dragging = false; };

  el.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  window.addEventListener('mouseup', end);

  el.addEventListener('touchstart', e => {
    start(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    move(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  window.addEventListener('touchend', end);
}

function spawnCard(src, name, date) {
  const vw    = window.innerWidth;
  const vh    = window.innerHeight;
  const bh    = barHeight() + 10;
  const maxW  = Math.min(Math.round(vw * 0.48), 340);
  const left  = 12 + Math.random() * Math.max(0, vw - maxW - 24);
  const top   = bh + 10 + Math.random() * Math.max(0, vh - bh - 250);
  const tilt  = (Math.random() - 0.5) * 4;

  const card  = document.createElement('div');
  card.className = 'img-card';
  card.style.cssText =
    `left:${left}px;top:${top}px;width:${maxW}px;` +
    `z-index:${++zTop};transform:rotate(${tilt}deg);`;

  const img   = document.createElement('img');
  img.src     = src;
  img.draggable = false;
  img.onload  = () => {
    // Widen for panoramic, narrow for portrait
    const r = img.naturalWidth / img.naturalHeight;
    if (r > 2.2) card.style.width = `${Math.min(vw * 0.72, 480)}px`;
    else if (r < 0.55) card.style.width = `${Math.min(vw * 0.32, 190)}px`;
  };

  const meta  = document.createElement('div');
  meta.className = 'card-meta';
  meta.textContent = `${date} · ${name.slice(0, 22)}`;

  card.appendChild(img);
  card.appendChild(meta);
  canvas.appendChild(card);
  makeDraggable(card);
}

async function ingestFile(file) {
  const date = new Date().toISOString().slice(0, 10);
  await persistToOPFS(file, date);

  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    const mt  = file.type || 'image/jpeg';
    images.push({ src, mediaType: mt, name: file.name, date });
    spawnCard(src, file.name, date);
    syncBadge();
    toastMsg(`↑ ${file.name.slice(0, 18)}`);
  };
  reader.readAsDataURL(file);
}

document.getElementById('upload-input').addEventListener('change', async e => {
  for (const f of Array.from(e.target.files)) await ingestFile(f);
  e.target.value = '';
});

// ══════════════════════════════════════════════════════════════
// CLAUDE API — IMAGE ANALYSIS
// Sends all loaded screenshots, asks for structured delta report
// ══════════════════════════════════════════════════════════════
async function runAnalysis() {
  if (!images.length) { toastMsg('No screenshots loaded'); return; }

  const panel   = document.getElementById('panel');
  const out     = document.getElementById('analysis-out');
  panel.classList.add('open');

  out.innerHTML = `
    <div class="loading-row">
      <div class="dots"><span></span><span></span><span></span></div>
      <span style="font-size:11px;color:var(--text-dim)">
        Reading ${images.length} screenshot${images.length > 1 ? 's' : ''}…
      </span>
    </div>`;

  const imgBlocks = images.map(img => ({
    type: 'image',
    source: {
      type: 'base64',
      media_type: img.mediaType,
      data: img.src.split(',')[1]
    }
  }));

  const prompt = images.length === 1
    ? `Analyze this trading screenshot. Extract every visible data point:
— Timestamp / session (pre-market / regular / after-hours / overnight)
— All ticker symbols + current prices
— % change per ticker
— Volume if visible
— P&L, positions, or order data if present
— Any other market metrics

Format with clear labels and values. Be data-dense.`
    : `You have ${images.length} trading screenshots from potentially different times or days.

Step 1 — Per-image extract:
For each screenshot state: timestamp, session, tickers + prices + % change, volume.

Step 2 — Delta Report (the important part):
Show exactly what changed between screenshots:
• Tickers added / removed
• Price Δ per ticker (show exact move + direction)
• % change shifts
• Volume changes
• Session transitions
• Notable patterns or momentum shifts

Format: use → for transitions, ▲ for up moves, ▼ for down moves. Be concise and precise.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [...imgBlocks, { type: 'text', text: prompt }]
        }]
      })
    });

    const data = await resp.json();

    if (data.error) {
      out.innerHTML = `<span style="color:var(--pre)">API error: ${data.error.message}</span>`;
      return;
    }

    const raw = (data.content || []).map(b => b.text || '').join('');

    // Light colorization pass
    out.innerHTML = raw
      .replace(/▲([^\s<\n]*)/g,  '<span style="color:var(--regular)">▲$1</span>')
      .replace(/▼([^\s<\n]*)/g,  '<span style="color:var(--pre)">▼$1</span>')
      .replace(/\+([0-9.]+%?)/g, '<span style="color:var(--regular)">+$1</span>')
      .replace(/-([0-9.]+%?)/g,  '<span style="color:var(--pre)">-$1</span>')
      .replace(/→/g,             '<span style="color:var(--accent)">→</span>')
      .replace(/\n/g,            '<br>');

  } catch (err) {
    out.innerHTML = `<span style="color:var(--pre)">Error: ${err.message}</span>`;
  }
}

document.getElementById('analyze-btn').addEventListener('click', runAnalysis);

document.getElementById('close-btn').addEventListener('click', () =>
  document.getElementById('panel').classList.remove('open'));

// Swipe-down closes panel
let py0 = 0;
document.getElementById('panel').addEventListener('touchstart', e => {
  py0 = e.touches[0].clientY;
}, { passive: true });
document.getElementById('panel').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - py0 > 55)
    document.getElementById('panel').classList.remove('open');
}, { passive: true });
</script>

</body>
</html>
